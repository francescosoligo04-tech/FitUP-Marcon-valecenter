<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitUP – Iscrizione Evento</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f2f2f2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 440px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    .card-header {
      background: #1a1a1a;
      padding: 2.25rem 2rem 2rem;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #4CAF50;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 3px 14px;
      border-radius: 20px;
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    .brand-name {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .brand-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }

    .card-body { padding: 2rem; }

    .field { margin-bottom: 1.25rem; }

    .field label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 7px;
      font-weight: 500;
    }

    .field input {
      width: 100%;
      padding: 11px 14px;
      font-size: 15px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
      color: #1a1a1a;
      background: #fafafa;
    }

    .field input:focus {
      border-color: #4CAF50;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(76,175,80,0.12);
    }

    .err {
      display: none;
      font-size: 13px;
      color: #c0392b;
      background: #fdf0ef;
      border-radius: 8px;
      padding: 9px 13px;
      margin-bottom: 1rem;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      background: #4CAF50;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.02em;
    }

    .submit-btn:hover { background: #2e7d32; }
    .submit-btn:active { transform: scale(0.98); }

    .submit-btn:disabled {
      background: #a5d6a7;
      cursor: not-allowed;
    }

    .success-body {
      padding: 2.5rem 2rem;
      text-align: center;
      display: none;
    }

    .success-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #4CAF50;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
    }

    .success-icon svg { width: 30px; height: 30px; }

    .success-title {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .success-msg {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .confirm-box {
      background: #f1f8e9;
      border-left: 3px solid #4CAF50;
      border-radius: 0 10px 10px 0;
      padding: 12px 16px;
      text-align: left;
      font-size: 13px;
      color: #388e3c;
      line-height: 1.8;
    }

    .confirm-box strong {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #1a1a1a;
      margin-bottom: 5px;
    }

    .new-btn {
      margin-top: 1.5rem;
      font-size: 13px;
      color: #2e7d32;
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="card">

  <!-- HEADER -->
  <div class="card-header">
    <div class="badge">Evento</div>
    <div class="brand-name">FitUP</div>
    <div class="brand-sub">Iscriviti e ricevi la conferma</div>
  </div>

  <!-- FORM -->
  <div class="card-body" id="formBody">
    <div class="field">
      <label for="nome">Nome e cognome</label>
      <input type="text" id="nome" placeholder="Es. Marco Rossi" autocomplete="name" />
    </div>
    <div class="field">
      <label for="telefono">Numero di telefono</label>
      <input type="tel" id="telefono" placeholder="+39 333 000 0000" autocomplete="tel" />
    </div>
    <div class="err" id="errMsg"></div>
    <button class="submit-btn" id="submitBtn" onclick="submitForm()">Confermo la mia partecipazione</button>
  </div>

  <!-- SUCCESSO -->
  <div class="success-body" id="successBody">
    <div class="success-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <p class="success-title">Iscrizione confermata!</p>
    <p class="success-msg">Grazie per esserti iscritto.<br>Ti contatteremo al numero indicato.</p>
    <div class="confirm-box">
      <strong>Riepilogo iscrizione</strong>
      <span id="confirmDetails"></span>
    </div>
    <button class="new-btn" onclick="resetForm()">Iscrivere un'altra persona</button>
  </div>

</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxzxnMVm1WozIzp0WKaHm5qmfqUhkB-hSH-JE5dJiVsb1mKzyVMkavcWUjXPWjIoKCW/exec";

  async function submitForm() {
    const nome = document.getElementById('nome').value.trim();
    const telefono = document.getElementById('telefono').value.trim();
    const err = document.getElementById('errMsg');
    const btn = document.getElementById('submitBtn');

    err.style.display = 'none';

    if (!nome) {
      err.textContent = 'Inserisci il tuo nome e cognome.';
      err.style.display = 'block';
      return;
    }
    if (!telefono) {
      err.textContent = 'Inserisci il tuo numero di telefono.';
      err.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Invio in corso...';

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, telefono })
      });

      document.getElementById('confirmDetails').innerHTML =
        'Nome: <b>' + nome + '</b><br>Telefono: ' + telefono;

      document.getElementById('formBody').style.display = 'none';
      document.getElementById('successBody').style.display = 'block';

    } catch (e) {
      err.textContent = 'Errore di rete. Riprova tra qualche secondo.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Confermo la mia partecipazione';
    }
  }

  function resetForm() {
    document.getElementById('nome').value = '';
    document.getElementById('telefono').value = '';
    document.getElementById('errMsg').style.display = 'none';
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = 'Confermo la mia partecipazione';
    document.getElementById('formBody').style.display = 'block';
    document.getElementById('successBody').style.display = 'none';
  }
</script>

</body>
</html>
